name: 自动化测试

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4  # ✅ 也建议升级到 v4
      
      - name: 安装 Python
        uses: actions/setup-python@v5  # ✅ 升级到 v5
        with:
          python-version: '3.10'
      
      - name: 安装 Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      
      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install webdriver-manager
      
      - name: 运行测试
        env:
          CI: true
        run: |
          pytest --html=report.html --self-contained-html -v
      
      - name: 上传报告
        if: always()
        uses: actions/upload-artifact@v4  # ✅ 改成 v4
        with:
          name: test-report
          path: report.html
